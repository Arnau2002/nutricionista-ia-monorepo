name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check
        run: |
          python -m compileall -q backend_logica etl-scripts etl_pro_master.py

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: PHP lint
        run: |
          find frontend_logica -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Prepare CI env files for compose validation
        run: |
          [ -f .env ] || touch .env
          [ -f backend_logica/.env ] || touch backend_logica/.env

      - name: Docker Compose config check
        run: |
          docker compose config > /dev/null
